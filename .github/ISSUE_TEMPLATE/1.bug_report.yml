name: Bug Report
description: Report a bug in the Asym PDF Document Builder fork
labels: ["Type: Bug"]
body:
  - type: markdown
    attributes:
      value: |
        This repository is the Asymmetric.al PDF Document Builder fork. Include the OpenSpec phase and whether the issue affects the PDF builder path, the retained upstream compatibility baseline, or future core integration.
  - type: input
    attributes:
      label: Version or baseline
      description: Include package versions, branch, commit SHA, or roadmap phase.
      value: "@react-email/editor@1.1.1, branch canary, Phase 1"
  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: dropdown
    attributes:
      label: What is affected (leave empty if unsure)
      multiple: true
      options:
        - "OpenSpec or roadmap"
        - "Asym PDF Document Builder docs"
        - "PDF editor fork"
        - "PDF renderer or DocRaptor path"
        - "Template schema or data binding"
        - "Batch generation"
        - "Unlayer migration or core adapter"
        - "Retained React Email compatibility package"
        - "Current editor baseline"
        - "Current renderer baseline"
        - "Preview app or playground"
        - "CLI or build tooling"
        - "Website or examples"
  - type: textarea
    attributes:
      label: Link to the code that reproduces this issue
      value: |
        Link to a minimal reproduction, failing fixture, branch, or exact repo path. For documentation or OpenSpec bugs, link to the relevant file and section.
  - type: textarea
    attributes:
      label: To Reproduce
      value: Steps to reproduce the behavior, please provide a clear description of how to reproduce the issue, based on the linked minimal reproduction. Screenshots can be provided in the issue body below. If using code blocks, make sure that [syntax highlighting is correct](https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/creating-and-highlighting-code-blocks#syntax-highlighting) and double check that the rendered preview is not broken.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: markdown
    attributes:
      value: Before posting the issue go through the steps you've written down to make sure the steps provided are detailed and clear.
  - type: markdown
    attributes:
      value: Contributors should be able to follow the steps provided in order to reproduce the bug.
  - type: input
    attributes:
      label: What's your node version? (if relevant)
      description: "Please specify the exact version."
  - type: textarea
    attributes:
      label: Commands and output
      description: Include exact commands and relevant output.
      value: |
        pnpm asym:baseline-smoke
