name: Tests

on:
  push:
    branches:
      - canary
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-22.04
    container:
      image: node:22
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1
      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup pnpm
        uses: pnpm/action-setup@738f428026a1f5a72398de22aeed83d859c4a660
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Fetch upstream baseline
        run: |
          if ! git remote get-url upstream >/dev/null 2>&1; then
            git remote add upstream https://github.com/resend/react-email.git
          fi
          git fetch upstream canary --depth=1
      - name: Run baseline smoke
        run: pnpm asym:baseline-smoke
      - name: Run editor unit tests
        run: pnpm --filter @react-email/editor test:unit
