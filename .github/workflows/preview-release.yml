name: Preview Release

on:
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
      - 'packages/**'
      - .github/workflows/preview-release.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  preview-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Confirm preview release policy
        run: |
          echo "Preview package publishing is disabled for this fork."
          echo "Re-enable it only after an OpenSpec release policy defines package scope, registry, and credentials."
