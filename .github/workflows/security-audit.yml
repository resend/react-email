name: Security Audit
on:
  push:
    branches:
      - main
      - canary
  pull_request:
jobs:
  audit:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    container:
      image: node:22
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1
      - name: pnpm setup
        uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19
      - name: Install packages
        run: pnpm install
      - name: Run security audit (production dependencies)
        run: pnpm audit --prod
