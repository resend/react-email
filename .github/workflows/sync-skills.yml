name: Skills Check

on:
  push:
    branches:
      - main
      - canary
    paths:
      - 'skills/**'
      - '.github/workflows/sync-skills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.github/workflows/sync-skills.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Confirm local skills are repo-owned
        run: |
          echo "Skills are maintained in this fork."
          echo "No external upstream skills sync is configured for this repository."
