name: OpenSpec Validation

on:
  push:
    branches:
      - canary
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-22.04
    container:
      image: node:22
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1
      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup pnpm
        uses: pnpm/action-setup@738f428026a1f5a72398de22aeed83d859c4a660
      - name: Validate active PDF builder OpenSpec change
        run: pnpm dlx @fission-ai/openspec@latest validate build-pdf-document-builder
      - name: Validate all OpenSpec changes
        run: pnpm dlx @fission-ai/openspec@latest validate --all
