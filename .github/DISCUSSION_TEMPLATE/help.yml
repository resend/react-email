body:
  - type: markdown
    attributes:
      value: |
        This repository is the Asymmetric.al PDF Document Builder fork. For implementation questions, include the roadmap phase and relevant OpenSpec path.
  - type: textarea
    attributes:
      label: Summary
      description: What do you need help with?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional information
      description: Any code snippets, command output, OpenSpec links, or dependency details that may be related?
      render: js
    validations:
      required: false
  - type: input
    attributes:
      label: Example
      description: A link to a minimal reproduction is helpful for collaborative debugging!
    validations:
      required: false
